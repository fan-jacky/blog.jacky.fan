services:
  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: blog-cms
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27027:27017"
    networks:
      - blog_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Payload CMS ───────────────────────────────────────────────────────────────
  cms:
    build:
      context: ./cms
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    env_file:
      - ./cms/.env
    environment:
      DATABASE_URI: mongodb://mongodb:27017/blog-cms
      PORT: "4101"
    volumes:
      - cms_uploads:/app/uploads
    ports:
      - "4101:4101"
    networks:
      - blog_network

  # ── Nuxt Blog ─────────────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - cms
    env_file:
      - .env
    environment:
      NUXT_PAYLOAD_URL: http://cms:4101
      PAYLOAD_URL: http://cms:4101
      NUXT_PUBLIC_PAYLOAD_URL: ${NUXT_PUBLIC_PAYLOAD_URL:-http://localhost:4101}
    ports:
      - "4100:4100"
    networks:
      - blog_network

volumes:
  mongodb_data:
  cms_uploads:

networks:
  blog_network:
    driver: bridge
